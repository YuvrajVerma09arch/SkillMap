<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo13</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
    background: radial-gradient(circle at 20% 20%, #6366f1, transparent 40%),
                radial-gradient(circle at 80% 80%, #ec4899, transparent 40%),
                #0f172a;
    overflow: hidden;
}

/* Floating animated blobs */
.blob {
    position: absolute;
    width: 400px;
    height: 400px;
    background: linear-gradient(45deg, #3b82f6, #ec4899);
    filter: blur(120px);
    opacity: 0.4;
    animation: float 10s infinite alternate ease-in-out;
}

@keyframes float {
    from { transform: translateY(-50px) rotate(0deg); }
    to { transform: translateY(50px) rotate(180deg); }
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center text-white relative">

<div class="blob top-0 left-0"></div>
<div class="blob bottom-0 right-0"></div>

<div class="backdrop-blur-xl bg-white/10 border border-white/20 rounded-3xl p-12 max-w-4xl w-full shadow-2xl relative z-10">

<h1 class="text-6xl font-extrabold bg-gradient-to-r from-indigo-400 via-pink-400 to-purple-400 bg-clip-text text-transparent mb-6">
SkillMap AI Engine
</h1>

<p class="text-lg text-gray-300 mb-12">
Your career, optimized by intelligence.
</p>

<div class="grid md:grid-cols-3 gap-6">

<div class="bg-white/5 p-6 rounded-2xl hover:scale-105 transition-transform border border-white/10">
<h3 class="text-xl font-bold mb-2">Resume Analyzer</h3>
<p class="text-gray-400">Vector embeddings. Semantic scoring.</p>
</div>

<div class="bg-white/5 p-6 rounded-2xl hover:scale-105 transition-transform border border-white/10">
<h3 class="text-xl font-bold mb-2">Career Architect</h3>
<p class="text-gray-400">AI-generated learning path.</p>
</div>

<div class="bg-white/5 p-6 rounded-2xl hover:scale-105 transition-transform border border-white/10">
<h3 class="text-xl font-bold mb-2">Mock Interview</h3>
<p class="text-gray-400">Voice-based AI simulation.</p>
</div>

</div>

</div>

</body>
</html>
