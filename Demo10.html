<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 10 - Phantom Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');
        
        body {
            background-color: #030a05; color: #10b981; font-family: 'Fira Code', monospace; overflow: hidden;
        }

        /* CRT Screen Curvature & Vignette */
        .crt-overlay {
            position: fixed; inset: 0; z-index: 50; pointer-events: none;
            background: radial-gradient(circle at center, transparent 50%, rgba(0, 5, 2, 0.8) 100%);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
        }

        /* Micro Scanlines */
        .scanlines {
            position: fixed; inset: 0; z-index: 49; pointer-events: none; opacity: 0.15;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,1) 50%, rgba(0,0,0,1));
            background-size: 100% 4px;
        }

        /* Phosphor Glow Text */
        .phosphor-glow {
            text-shadow: 0 0 5px #10b981, 0 0 15px #10b981, 0 0 30px rgba(16, 185, 129, 0.4);
        }

        /* Glass Terminal Window */
        .terminal-window {
            background: rgba(3, 20, 10, 0.6);
            backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.1), inset 0 0 20px rgba(16, 185, 129, 0.05);
            position: relative;
        }
        
        /* Blinking Cursor */
        .cursor-blink::after {
            content: '█'; animation: blink 1s step-end infinite; margin-left: 5px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Hex Background Data Stream */
        .hex-bg {
            position: absolute; inset: 0; opacity: 0.05; font-size: 10px; line-height: 1;
            word-wrap: break-word; overflow: hidden; color: #10b981; z-index: -1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="crt-overlay"></div>
    <div class="scanlines"></div>
    
    <div class="hex-bg" id="hexGrid"></div>

    <div class="terminal-window max-w-5xl w-full p-1 rounded-sm z-10">
        <div class="border-b border-emerald-500/30 px-4 py-2 flex justify-between items-center bg-emerald-950/50">
            <span class="text-xs tracking-widest uppercase">root@skillmap:~# ./init_match.sh</span>
            <div class="flex gap-2">
                <div class="w-3 h-3 bg-emerald-900 border border-emerald-500"></div>
                <div class="w-3 h-3 bg-emerald-500 phosphor-glow"></div>
            </div>
        </div>

        <div class="p-10 md:p-16">
            <div class="text-emerald-500/50 text-sm mb-6 uppercase tracking-widest">
                [ AUTHENTICATED ] <br> ACCESSING DECENTRALIZED TALENT POOL...
            </div>
            
            <h1 class="text-5xl md:text-7xl font-bold mb-8 phosphor-glow text-white cursor-blink">
                Bypass the ATS.
            </h1>
            
            <p class="text-xl mb-12 max-w-2xl border-l-2 border-emerald-500 pl-6 text-emerald-100/80">
                Execute algorithmic matching. Deploy the resume payload. Secure your target role before the market detects the opening.
            </p>

            <div class="flex flex-col sm:flex-row gap-6">
                <button class="bg-emerald-500 text-black font-bold py-4 px-8 hover:bg-emerald-400 transition-colors uppercase tracking-widest shadow-[0_0_20px_rgba(16,185,129,0.5)]">
                    > Inject Resume
                </button>
                <button class="bg-transparent border border-emerald-500 text-emerald-500 font-bold py-4 px-8 hover:bg-emerald-950 transition-colors uppercase tracking-widest">
                    > Query Openings
                </button>
            </div>
        </div>
    </div>

    <script>
        // Generate random hex data for the background
        const hex = "0123456789ABCDEF";
        let out = "";
        for(let i=0; i<5000; i++) out += hex[Math.floor(Math.random()*16)] + " ";
        document.getElementById('hexGrid').innerText = out;
    </script>
</body>
</html>
