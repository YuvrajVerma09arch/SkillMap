<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 6 - Claymorphism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f4f8; font-family: 'Nunito', sans-serif; }
        
        /* The Clay Effect */
        .clay-card {
            background: #ffffff;
            border-radius: 36px;
            /* Outward shadow for depth, Inward shadow for pillowy roundness */
            box-shadow: 
                20px 20px 40px #d1d9e6, 
                -20px -20px 40px #ffffff,
                inset 4px 4px 10px rgba(255, 255, 255, 0.8),
                inset -4px -4px 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }
        
        .clay-btn {
            background: #4ade80; /* Bright Green */
            border-radius: 24px;
            color: white;
            font-weight: 800;
            /* 3D Button Effect */
            box-shadow: 
                0 8px 0 #16a34a, /* Hard bottom shadow */
                inset 2px 2px 5px rgba(255,255,255,0.4),
                inset -2px -2px 5px rgba(0,0,0,0.1);
            transition: all 0.1s;
        }
        .clay-btn:active {
            transform: translateY(8px);
            box-shadow: 
                0 0px 0 #16a34a,
                inset 2px 2px 5px rgba(255,255,255,0.4),
                inset -2px -2px 5px rgba(0,0,0,0.1);
        }

        .clay-icon {
            background: #60a5fa;
            border-radius: 20px;
            box-shadow: 
                8px 8px 16px #d1d9e6, 
                -8px -8px 16px #ffffff,
                inset 2px 2px 5px rgba(255,255,255,0.4),
                inset -2px -2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-slate-700">

    <div class="clay-card max-w-4xl w-full p-10 md:p-16 flex flex-col md:flex-row items-center gap-12">
        
        <div class="w-full md:w-1/2 flex justify-center relative">
            <div class="w-64 h-64 bg-blue-100 rounded-[50px] rotate-3 absolute -z-10"></div>
            <div class="clay-icon w-48 h-48 flex items-center justify-center text-7xl z-10 rotate-[-5deg]">
                🤖
            </div>
            <div class="clay-icon absolute top-0 right-10 w-16 h-16 bg-yellow-300 text-2xl flex items-center justify-center">✨</div>
            <div class="clay-icon absolute bottom-10 left-0 w-20 h-20 bg-pink-400 text-3xl flex items-center justify-center">📈</div>
        </div>

        <div class="w-full md:w-1/2 text-center md:text-left">
            <div class="inline-block bg-orange-100 text-orange-600 font-bold px-4 py-2 rounded-xl mb-4 shadow-sm">
                LEVEL UP YOUR CAREER
            </div>
            <h1 class="text-5xl font-black mb-6 leading-tight text-slate-800">
                Play the job market. <br> And win.
            </h1>
            <p class="text-lg text-slate-500 mb-10 font-medium">
                Upload your resume. Train with our AI. Get a personalized roadmap to level up your skills.
            </p>
            <div class="flex gap-4 justify-center md:justify-start">
                <button class="clay-btn py-4 px-8 text-xl">
                    Start Playing
                </button>
            </div>
        </div>

    </div>

</body>
</html>
