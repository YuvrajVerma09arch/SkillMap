{% extends "base.html" %}

{% block content %}
<style>
    /* --- THEME OVERRIDES --- */
    body {
        background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 50%, #60a5fa 100%);
        min-height: 100vh;
        color: white;
    }

    /* Floating Shapes */
    .bg-shape {
        position: fixed;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        backdrop-filter: blur(5px);
        z-index: -1;
        animation: float 20s infinite ease-in-out;
    }
    .shape-1 { width: 400px; height: 400px; top: -10%; left: -10%; }
    .shape-2 { width: 300px; height: 300px; bottom: 10%; right: -5%; animation-delay: -5s; }

    /* --- GLASS CONTAINER --- */
    .glass-container {
        max-width: 800px;
        margin: 40px auto;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
        overflow: hidden;
        color: #1e293b;
        position: relative;
        z-index: 10;
    }

    .header-section {
        background: #2563EB;
        padding: 40px;
        text-align: center;
        color: white;
    }

    .progress-wrapper {
        padding: 20px 40px;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
    }
    .progress {
        height: 6px;
        border-radius: 10px;
        background: #e2e8f0;
    }
    .progress-bar {
        background: #2563EB;
        transition: width 0.4s ease;
    }

    .form-section {
        padding: 40px;
        display: none;
        animation: slideIn 0.5s ease;
    }
    .form-section.active {
        display: block;
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    label { font-weight: 600; color: #475569; margin-bottom: 8px; }

    .form-control, .form-select {
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        position: relative;
    }
    .form-control:focus {
        border-color: #2563EB;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    /* --- AUTOCOMPLETE LIST (Reusable) --- */
    .suggestions-list {
        background: white;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        max-height: 200px;
        overflow-y: auto;
        position: absolute;
        width: 90%;
        z-index: 1000;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        display: none;
    }
    .suggestion-item {
        padding: 10px 15px;
        cursor: pointer;
        border-bottom: 1px solid #f1f5f9;
        font-size: 0.9rem;
    }
    .suggestion-item:hover {
        background-color: #eff6ff;
        color: #2563EB;
    }

    /* Recruiter Specific Chips */
    .option-chip {
        display: inline-flex;
        padding: 10px 20px;
        margin: 5px;
        background: #f1f5f9;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        font-weight: 500;
        user-select: none;
    }
    .option-chip input { display: none; }
    
    .option-chip.selected {
        background: #eff6ff;
        border-color: #2563EB;
        color: #2563EB;
        font-weight: 700;
        box-shadow: 0 4px 6px rgba(37, 99, 235, 0.1);
    }

    .btn-nav { padding: 12px 30px; border-radius: 50px; font-weight: 600; }
    
    /* Invalid Input Shake */
    .shake { animation: shake 0.3s; border-color: #ef4444 !important; }
    @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        50% { transform: translateX(5px); }
        75% { transform: translateX(-5px); }
        100% { transform: translateX(0); }
    }
</style>

<div class="bg-shape shape-1"></div>
<div class="bg-shape shape-2"></div>

<div class="glass-container">
    
    <div class="header-section">
        <h1 class="fw-bold mb-2">Company Setup</h1>
        <p class="opacity-75 mb-0">Let's set up your hiring profile.</p>
    </div>

    <div class="progress-wrapper">
        <div class="d-flex justify-content-between text-muted small mb-2 fw-bold">
            <span>Company Info</span>
            <span>Recruiter Info</span>
            <span>Finish</span>
        </div>
        <div class="progress">
            <div class="progress-bar" id="progressBar" style="width: 33%"></div>
        </div>
    </div>

    <form id="recruiterForm" method="POST" action="{{ url_for('main.save_recruiter_profile') }}">
        
        <div class="form-section active" id="step1">
            <h4 class="mb-4 text-primary fw-bold">1. Company Details</h4>
            
            <div class="mb-3">
                <label>Company Name <span class="text-danger">*</span></label>
                <input type="text" name="company_name" class="form-control" placeholder="e.g. Acme Corp" required minlength="2">
            </div>

            <div class="mb-3">
                <label>Industry <span class="text-danger">*</span></label>
                <select name="industry" class="form-select" required>
                    <option value="" disabled selected>Select Industry</option>
                    <option value="Tech">Technology / Software</option>
                    <option value="Finance">Finance & Banking</option>
                    <option value="Healthcare">Healthcare</option>
                    <option value="Education">Education</option>
                    <option value="Manufacturing">Manufacturing</option>
                    <option value="Retail">Retail & E-commerce</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Company Size</label>
                <div class="d-flex flex-wrap">
                    <label class="option-chip"><input type="radio" name="size" value="1-10" required> 1-10</label>
                    <label class="option-chip"><input type="radio" name="size" value="11-50"> 11-50</label>
                    <label class="option-chip"><input type="radio" name="size" value="51-200"> 51-200</label>
                    <label class="option-chip"><input type="radio" name="size" value="200-500"> 200-500</label>
                    <label class="option-chip"><input type="radio" name="size" value="500+"> 500+</label>
                </div>
            </div>
            
            <div class="mb-3 position-relative">
                <label>Location (HQ) <span class="text-danger">*</span></label>
                <input type="text" name="location" id="locationInput" class="form-control" 
                       placeholder="Start typing city..." autocomplete="off" required>
                <div id="locationSuggestions" class="suggestions-list"></div>
                <small class="text-muted">Headquarters location.</small>
            </div>
            
            <div class="mb-3">
                <label>Website (Optional)</label>
                <input type="url" name="website" class="form-control" placeholder="https://example.com">
            </div>

            <div class="mt-4 text-end">
                <button type="button" class="btn btn-primary btn-nav" onclick="validateAndNext(1)">Next <i class="bi bi-arrow-right"></i></button>
            </div>
        </div>

        <div class="form-section" id="step2">
            <h4 class="mb-4 text-primary fw-bold">2. Your Details</h4>
            
            <div class="mb-3">
                <label>Your Name <span class="text-danger">*</span></label>
                <input type="text" name="recruiter_name" class="form-control" value="{{ current_user.name }}" required minlength="2">
            </div>

            <div class="mb-3">
                <label>Your Role <span class="text-danger">*</span></label>
                <select name="role_title" class="form-select" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="HR Manager">HR Manager</option>
                    <option value="Talent Acquisition">Talent Acquisition</option>
                    <option value="Founder">Founder / CEO</option>
                    <option value="Recruiter">Recruiter</option>
                    <option value="Hiring Manager">Hiring Manager</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Work Email</label>
                <input type="email" name="work_email" class="form-control bg-light" value="{{ current_user.email }}" readonly>
                <small class="text-muted"><i class="bi bi-lock-fill"></i> Linked to account.</small>
            </div>

            <div class="mt-4 d-flex justify-content-between">
                <button type="button" class="btn btn-light btn-nav" onclick="prevStep(2)">Back</button>
                <button type="submit" class="btn btn-success btn-nav px-5 shadow">Finish Setup <i class="bi bi-check-lg"></i></button>
            </div>
        </div>

    </form>
</div>

<script>
    // --- API: LOCATION AUTOCOMPLETE ---
    const locationInput = document.getElementById('locationInput');
    const locationList = document.getElementById('locationSuggestions');

    locationInput.addEventListener('input', debounce(async function() {
        const query = this.value;
        if (query.length < 3) { locationList.style.display = 'none'; return; }

        try {
            // INDIA ONLY FLAG
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&countrycodes=in&q=${query}`);
            const data = await response.json();

            locationList.innerHTML = '';
            if (data.length > 0) {
                locationList.style.display = 'block';
                data.slice(0, 5).forEach(place => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerText = place.display_name;
                    div.onclick = () => {
                        locationInput.value = place.display_name;
                        locationList.style.display = 'none';
                    };
                    locationList.appendChild(div);
                });
            }
        } catch (e) { console.error("API Error", e); }
    }, 500));

    // Hide suggestions when clicking outside
    document.addEventListener('click', function(e) {
        if (e.target !== locationInput) locationList.style.display = 'none';
    });


    // --- VALIDATION & NAVIGATION ---
    function validateAndNext(currentStep) {
        const section = document.getElementById('step' + currentStep);
        const inputs = section.querySelectorAll('input[required], select[required]');
        let valid = true;
        
        inputs.forEach(input => {
            if (!input.value) {
                valid = false;
                input.classList.add('shake');
                input.classList.add('is-invalid');
                setTimeout(() => input.classList.remove('shake'), 500);
                input.addEventListener('input', () => input.classList.remove('is-invalid'));
            }
        });

        if (valid) {
            nextStep(currentStep + 1);
        }
    }

    function nextStep(step) {
        document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
        const percent = (step / 2) * 100;
        document.getElementById('progressBar').style.width = percent + '%';
    }

    function prevStep(step) {
        nextStep(step - 1);
    }

    // Radio Button Logic
    document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', function() {
            this.closest('div').querySelectorAll('.option-chip').forEach(l => l.classList.remove('selected'));
            this.parentElement.classList.add('selected');
        });
    });

    // Helper: Debounce
    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
        };
    }
</script>
{% endblock %}
