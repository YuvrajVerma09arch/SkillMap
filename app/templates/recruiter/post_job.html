{% extends "base.html" %}

{% block content %}
<style>
    /* Theme Consistency */
    body {
        background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 50%, #60a5fa 100%);
        min-height: 100vh;
        color: white;
    }
    
    .glass-container {
        max-width: 900px;
        margin: 40px auto;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .form-label {
        font-weight: 600;
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 8px;
    }

    .form-control, .form-select {
        background: rgba(255, 255, 255, 0.9);
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 1rem;
        color: #1e293b;
    }
    .form-control:focus {
        background: white;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.3);
    }

    /* Helper text for the JSON fields */
    .hint-text {
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 4px;
    }
</style>

<div class="container">
    <div class="glass-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Post a New Job</h2>
            <a href="{{ url_for('main.recruiter_dashboard') }}" class="btn btn-outline-light rounded-pill px-4">Cancel</a>
        </div>

        <form action="{{ url_for('jobs.post_job') }}" method="POST">
            
            <div class="row g-4 mb-4">
                <div class="col-md-12">
                    <label class="form-label">Job Title</label>
                    <input type="text" name="title" class="form-control" placeholder="e.g. Senior Python Developer" required>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-control" placeholder="e.g. Ahmedabad / Remote" required>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label">Work Type</label>
                    <select name="job_type" class="form-select">
                        <option value="On-Site">On-Site</option>
                        <option value="Remote">Remote</option>
                        <option value="Hybrid">Hybrid</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Salary Range</label>
                    <input type="text" name="salary_range" class="form-control" placeholder="e.g. ₹8L - ₹12L PA">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Experience Required</label>
                    <select name="experience_required" class="form-select">
                        <option value="0-1 Years">Fresher (0-1 Years)</option>
                        <option value="1-3 Years">Junior (1-3 Years)</option>
                        <option value="3-5 Years">Mid-Level (3-5 Years)</option>
                        <option value="5+ Years">Senior (5+ Years)</option>
                    </select>
                </div>
            </div>

            <hr class="border-white opacity-25 my-4">

            <div class="mb-4">
                <label class="form-label">Job Description (Summary)</label>
                <textarea name="description" class="form-control" rows="3" placeholder="Brief overview of the role..." required></textarea>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Key Responsibilities</label>
                    <textarea name="responsibilities" class="form-control" rows="4" placeholder="• Design APIs&#10;• Fix bugs&#10;• Drink coffee"></textarea>
                    <div class="hint-text">Enter each point on a new line.</div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Required Skills</label>
                    <textarea name="required_skills" class="form-control" rows="4" placeholder="Python, Flask, SQL, React"></textarea>
                    <div class="hint-text">Separate skills with commas.</div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Nice to Have (Optional)</label>
                    <textarea name="nice_to_have" class="form-control" rows="2" placeholder="AWS, Docker..."></textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Benefits (Optional)</label>
                    <textarea name="benefits" class="form-control" rows="2" placeholder="Health Insurance, Flexible hours..."></textarea>
                </div>
            </div>

            <div class="mt-5 text-end">
                <button type="submit" class="btn btn-light text-primary fw-bold px-5 py-3 rounded-pill shadow">
                    Publish Job Post
                </button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
