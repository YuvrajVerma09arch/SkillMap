{% extends "base.html" %}
{% block content %}
<div style="max-width:900px; margin:0 auto; padding:48px 24px; position:relative; z-index:1;">
    <div class="animate-fade-up" style="margin-bottom:48px;">
        <div class="label-signal" style="margin-bottom:8px;">Practice</div>
        <h1 class="display" style="font-size:clamp(24px,3vw,40px); color:var(--chalk);">Mock Interview</h1>
    </div>
    <div style="background:var(--ink-2); border:1px solid var(--wire); padding:32px; text-align:center;">
        <i class="bi bi-mic" style="font-size:48px; color:var(--chalk-3); margin-bottom:16px; display:block; opacity:0.5;"></i>
        <p style="font-size:14px; color:var(--chalk-3); line-height:1.7;">
            Mock interview feature coming soon. Practice real interview questions and get AI feedback.
        </p>
    </div>
</div>
{% endblock %}
