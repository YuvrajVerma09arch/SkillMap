{% extends "base.html" %}

{% block content %}
<style>
    /* --- THEME OVERRIDES (Glass-ify the Teammate's Design) --- */
    body {
        /* Force the Deep Blue Gradient */
        background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 50%, #60a5fa 100%) !important;
        color: white;
        min-height: 100vh;
    }

    /* Floating Background Bubbles */
    .bg-shape {
        position: fixed;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        backdrop-filter: blur(5px);
        z-index: -1;
        animation: float 20s infinite ease-in-out;
    }
    .shape-1 { width: 400px; height: 400px; top: -10%; left: -10%; }
    .shape-2 { width: 300px; height: 300px; bottom: 10%; right: -5%; animation-delay: -5s; }
    
    @keyframes float {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(20px, -20px); }
    }

    /* --- GLASS COMPONENTS --- */
    .header {
        text-align: center;
        margin-bottom: 3rem;
        margin-top: 2rem;
        color: white;
    }
    
    .main-heading {
        font-weight: 800;
        letter-spacing: -1px;
        text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    
    .sub-heading {
        color: rgba(255, 255, 255, 0.8);
        font-size: 1.2rem;
    }

    /* Glass Filter Section */
    .filter-section {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 2rem;
        border-radius: 20px;
        margin-bottom: 3rem;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .filter-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr auto;
        gap: 1rem;
    }

    /* Inputs adapted for Glass */
    .filter-section select {
        padding: 1rem 1.2rem;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 12px;
        font-size: 0.95rem;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.9); /* Slightly opaque for readability */
        color: #1e293b;
        cursor: pointer;
    }

    .filter-btn {
        padding: 1rem 2.5rem;
        background: #ffffff;
        color: #2563EB;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    .filter-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        background: #f1f5f9;
    }

    /* Glass Job Cards */
    .job-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
        gap: 2rem;
    }

    .job-card {
        background: rgba(255, 255, 255, 0.1); /* Glass background */
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        padding: 2rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        color: white;
    }

    .job-card:hover {
        transform: translateY(-10px);
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.4);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    .job-header {
        display: flex;
        align-items: center;
        gap: 1.2rem;
        margin-bottom: 1.5rem;
    }

    .company-logo {
        width: 60px;
        height: 60px;
        background: white;
        color: #2563EB;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 1.8rem;
        flex-shrink: 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .company-name {
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.8);
        font-weight: 600;
    }

    .job-title {
        font-size: 1.4rem;
        color: white;
        font-weight: 700;
        margin: 0;
    }

    .job-meta {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.2rem;
        flex-wrap: wrap;
    }

    .meta-item {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.9rem;
        font-weight: 500;
    }

    .meta-item i { color: #93c5fd; }

    .job-description {
        color: rgba(255, 255, 255, 0.8);
        line-height: 1.6;
        margin-bottom: 1.5rem;
        font-size: 0.95rem;
        flex-grow: 1;
    }

    .job-tags {
        display: flex;
        gap: 0.6rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
    }

    .tag {
        padding: 0.4rem 0.8rem;
        background: rgba(255, 255, 255, 0.15);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 600;
    }

    .job-actions {
        display: flex;
        gap: 1rem;
        margin-top: auto;
    }

    .btn-action {
        flex: 1;
        padding: 0.8rem;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        text-decoration: none; /* For A tags */
        display: inline-block;
    }

    .btn-apply {
        background: white;
        color: #2563EB;
    }
    .btn-apply:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .btn-match {
        background: transparent;
        border: 2px solid white;
        color: white;
    }
    .btn-match:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
    }

    .btn-applied {
        background: #10b981 !important; /* Green */
        color: white !important;
        cursor: default;
        pointer-events: none;
    }

    @media (max-width: 768px) {
        .filter-row { grid-template-columns: 1fr; }
    }
</style>

<div class="bg-shape shape-1"></div>
<div class="bg-shape shape-2"></div>

<div class="container">
    <div class="header">
        <h1 class="main-heading">Find Jobs Here</h1>
        <p class="sub-heading">Discover opportunities that match your skills</p>
    </div>

    <div class="filter-section">
        <div class="filter-row">
            <select id="locationFilter">
                <option value="">Location</option>
                <option value="remote">Remote</option>
                <option value="onsite">On-site</option>
            </select>
            <select id="typeFilter">
                <option value="">Job Type</option>
                <option value="fulltime">Full-time</option>
            </select>
            <select id="experienceFilter">
                <option value="">Experience</option>
                <option value="entry">Entry Level</option>
                <option value="mid">Mid Level</option>
                <option value="senior">Senior Level</option>
            </select>
            <button class="filter-btn" onclick="applyFilters()">
                <i class="bi bi-search me-2"></i> Filter
            </button>
        </div>
    </div>

    <div class="job-grid" id="jobGrid">
        </div>
</div>

<form id="analyzeForm" method="POST" style="display:none;"></form>
<form id="applyForm" method="POST" style="display:none;"></form>

<script>
    // 1. INJECT REAL DATA FROM FLASK (The Bridge)
    // We use |safe to allow the JSON string to be rendered as literal JS code
    const jobs = {{ jobs_json | safe }};

    function renderJobs(jobsToRender) {
        const jobGrid = document.getElementById('jobGrid');
        
        if (jobsToRender.length === 0) {
            jobGrid.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: rgba(255,255,255,0.7);">
                    <i class="bi bi-search" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                    <h3 style="font-size: 1.5rem;">No jobs found</h3>
                </div>
            `;
            return;
        }

        jobGrid.innerHTML = jobsToRender.map(job => `
            <div class="job-card">
                <div class="job-header">
                    <div class="company-logo">${job.logo}</div>
                    <div class="job-title-section">
                        <div class="company-name">${job.company}</div>
                        <h3 class="job-title">${job.title}</h3>
                    </div>
                </div>
                <div class="job-meta">
                    <div class="meta-item">
                        <i class="bi bi-geo-alt-fill"></i>
                        <span>${job.location}</span>
                    </div>
                    <div class="meta-item">
                        <i class="bi bi-briefcase-fill"></i>
                        <span>${job.type}</span>
                    </div>
                    <div class="meta-item">
                        <i class="bi bi-cash"></i>
                        <span>${job.salary}</span>
                    </div>
                </div>
                <p class="job-description">${job.description.substring(0, 150)}...</p>
                <div class="job-tags">
                    ${job.tags.slice(0,3).map(tag => `<span class="tag">${tag}</span>`).join('')}
                </div>
                <div class="job-actions">
                    <button class="btn-action ${job.applied ? 'btn-applied' : 'btn-apply'}" 
                            onclick="applyNow(${job.id}, '${job.applied}')">
                        ${job.applied ? '<i class="bi bi-check-lg"></i> Applied' : 'Apply Now'}
                    </button>
                    <button class="btn-action btn-match" onclick="matchResume(${job.id})">
                        Analyze Fit
                    </button>
                </div>
            </div>
        `).join('');
    }

    // --- REAL BACKEND CONNECTIONS ---

    function matchResume(jobId) {
        // Redirect to the Analyze route (which handles the POST via a form submission usually, 
        // but for simplicity we'll trigger a form submit via JS)
        const form = document.getElementById('analyzeForm');
        form.action = `/analyze-fit/${jobId}`;
        form.submit();
    }

    function applyNow(jobId, isApplied) {
        if (isApplied === 'true') return; // Do nothing if already applied

        if(confirm("Ready to apply? We will send your profile to the recruiter.")) {
            const form = document.getElementById('applyForm');
            form.action = `/apply/${jobId}`;
            form.submit();
        }
    }

    function applyFilters() {
        const location = document.getElementById('locationFilter').value;
        // Simple filtering logic (Expanded as needed)
        let filteredJobs = jobs.filter(job => {
            if(location && job.locationType !== location) return false;
            return true;
        });
        renderJobs(filteredJobs);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        renderJobs(jobs);
    });
</script>
{% endblock %}
