{% extends "base.html" %}
{% block content %}
<div style="max-width:1000px; margin:0 auto; padding:48px 24px; position:relative; z-index:1;">
    <div class="animate-fade-up" style="margin-bottom:48px;">
        <div class="label-signal" style="margin-bottom:8px;">Career Path</div>
        <h1 class="display" style="font-size:clamp(24px,3vw,40px); color:var(--chalk);">Your Roadmap</h1>
    </div>
    <div style="background:var(--ink-2); border:1px solid var(--wire); padding:32px; text-align:center;">
        <p style="font-size:14px; color:var(--chalk-3); line-height:1.7;">
            Your personalized career roadmap will appear here after you complete the questionnaire and run the roadmap generator.
        </p>
        <a href="{{ url_for('main.setup_profile') }}" class="btn-signal" style="display:inline-block; margin-top:16px; padding:12px 24px;">
            Start Questionnaire →
        </a>
    </div>
</div>
{% endblock %}
