{% extends "base.html" %}

{% block extra_head %}
<style>
    .auth-card {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    
    .input-field {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
    }
    
    .input-field:focus {
        background: rgba(0, 0, 0, 0.4);
        border-color: #38bdf8;
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
    }
</style>
{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full animate__animated animate__fadeInUp">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-white mb-2">Welcome Back</h1>
            <p class="text-gray-400">Enter your credentials to access your Career Roadmap.</p>
        </div>

        <div class="auth-card p-8 rounded-[2.5rem]">
            <form action="{{ url_for('auth.login') }}" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2 ml-1">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="bi bi-envelope text-gray-500"></i>
                        </div>
                        <input type="email" name="email" required 
                            class="input-field block w-full pl-11 pr-4 py-3.5 rounded-2xl text-white placeholder-gray-500 focus:outline-none"
                            placeholder="name@company.com">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2 ml-1">
                        <label class="block text-sm font-semibold text-gray-300">Password</label>
                        <a href="#" class="text-xs font-bold text-brand-400 hover:text-brand-300 transition-colors">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="bi bi-shield-lock text-gray-500"></i>
                        </div>
                        <input type="password" name="password" required 
                            class="input-field block w-full pl-11 pr-4 py-3.5 rounded-2xl text-white placeholder-gray-500 focus:outline-none"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center ml-1">
                    <input id="remember-me" name="remember-me" type="checkbox" 
                        class="h-4 w-4 rounded border-gray-700 bg-gray-900 text-brand-500 focus:ring-brand-500 focus:ring-offset-gray-900">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-400">Remember me</label>
                </div>

                <button type="submit" 
                    class="w-full bg-brand-500 hover:bg-brand-600 text-white py-4 rounded-2xl font-bold text-lg transition-all shadow-lg shadow-brand-500/20 hover:scale-[1.02] active:scale-[0.98]">
                    Sign In
                </button>
            </form>

            <div class="mt-8">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-white/10"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-transparent text-gray-500 font-medium">Or continue with</span>
                    </div>
                </div>

                <div class="mt-6 grid grid-cols-1 gap-4">
                    <a href="{{ url_for('auth.google_login') }}" 
                        class="flex items-center justify-center space-x-3 bg-white/5 hover:bg-white/10 border border-white/10 py-3.5 rounded-2xl transition-all group">
                        <i class="bi bi-google text-gray-400 group-hover:text-white"></i>
                        <span class="text-sm font-bold text-gray-300 group-hover:text-white">Google</span>
                    </a>
                </div>
            </div>
        </div>

        <p class="mt-10 text-center text-gray-400">
            Don't have an account? 
            <a href="{{ url_for('auth.role_select') }}" class="font-bold text-brand-400 hover:text-brand-300 transition-colors">Get Started</a>
        </p>
    </div>
</div>
{% endblock %}
