<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Moving Holographic Background */
        .holo-bg {
            position: absolute; width: 150vw; height: 150vh; top: -25%; left: -25%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 100%),
                conic-gradient(from 0deg, #ffb7b2, #a6e7ff, #daffcc, #fff5ba, #e2cbf7, #ffb7b2);
            filter: blur(80px); opacity: 0.6;
            animation: spin-slow 20s linear infinite;
            z-index: 0;
        }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }

        /* The Prismatic Card */
        .prism-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 30px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            /* The Border Trick */
            padding: 2px;
            z-index: 10;
        }
        /* Animated Rainbow Border */
        .prism-card::before {
            content: ""; position: absolute; inset: 0; border-radius: 32px; padding: 2px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
            animation: border-flow 5s linear infinite; 
        }

        /* Floating Elements */
        .float-item { animation: float 6s ease-in-out infinite; }
        @keyframes float { 
            0%, 100% { transform: translateY(0px); } 
            50% { transform: translateY(-20px); } 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="holo-bg"></div>

    <div class="max-w-6xl w-full grid grid-cols-1 md:grid-cols-2 gap-12 items-center relative z-10">
        
        <div class="space-y-8">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/50 border border-white/60 backdrop-blur-md shadow-sm">
                <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                <span class="text-xs font-bold tracking-widest uppercase text-slate-600">Ultra Instinct V.2</span>
            </div>
            
            <h1 class="text-7xl font-black tracking-tighter text-slate-900 leading-[0.9]">
                Crystal <br> Clear <br> <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">Hiring.</span>
            </h1>
            
            <p class="text-xl text-slate-500 font-medium max-w-md">
                Transparency meets Intelligence. We stripped away the noise to build the cleanest hiring engine on earth.
            </p>

            <div class="flex gap-4">
                <button class="px-8 py-4 rounded-full bg-slate-900 text-white font-bold hover:scale-105 transition-transform shadow-xl">
                    Get Started
                </button>
                <button class="px-8 py-4 rounded-full bg-white text-slate-900 font-bold border border-slate-200 hover:bg-slate-50 transition-colors shadow-sm">
                    View Demo
                </button>
            </div>
        </div>

        <div class="prism-card p-8 md:p-12 float-item">
            <div class="flex items-center justify-between mb-8 border-b border-black/5 pb-4">
                <div class="text-slate-900 font-bold text-lg">Resume Analysis</div>
                <div class="text-green-500 font-mono">98% MATCH</div>
            </div>
            
            <div class="space-y-4">
                <div class="h-24 rounded-2xl bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-100 p-4 flex items-center gap-4">
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm text-2xl">🐍</div>
                    <div>
                        <div class="font-bold text-slate-800">Python Expert</div>
                        <div class="text-xs text-slate-500">Found in Projects & Skills</div>
                    </div>
                </div>

                <div class="h-24 rounded-2xl bg-gradient-to-r from-purple-50 to-fuchsia-50 border border-purple-100 p-4 flex items-center gap-4">
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm text-2xl">🧠</div>
                    <div>
                        <div class="font-bold text-slate-800">Machine Learning</div>
                        <div class="text-xs text-slate-500">TensorFlow Certified</div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
